name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, test]

jobs:
  validate:
    name: Validar arquivos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar se index.html existe
        run: test -f index.html

      - name: Verificar se style.css existe
        run: test -f style.css

      - name: Verificar se app.js existe
        run: test -f app.js

      - name: Verificar estrutura do HTML
        run: |
          grep -q "<!DOCTYPE html>" index.html && echo "DOCTYPE ok"
          grep -q "<title>" index.html && echo "title ok"
          grep -q "app.js" index.html && echo "script link ok"

      - name: Verificar sintaxe do JS
        run: node --check app.js
